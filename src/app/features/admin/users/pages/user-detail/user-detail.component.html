<div class="flex items-center justify-between mb-6">
    <h3 class="text-xl font-semibold ">
        Users Info
    </h3>
    <div class="flex gap-2">
        <a routerLink="/admin/users" class="">
            <app-button variant="outline" >Back</app-button>
        </a>
        <a routerLink='/admin/users/{{user()?.id}}/edit' class="">
            <app-button variant="outline">Edit</app-button>
        </a>
        <app-button variant="danger" (click)="onDelete()">Delete</app-button>
        <a routerLink="/admin/profile" class="">
            <app-button variant="info">Profile</app-button>
        </a>
    </div>
</div>

<hr class="text-gray-700" />

<div class="">
    <div class="flex py-6">
        <div class="w-1/3">Profile Photo</div>
        <div class="w-2/3 text-gray-400">
            <img class="w-44 rounded-lg" src="{{ user()?.avatar }}" alt="">
        </div>
    </div>
    <hr class="text-gray-700" />

    <div class="flex py-6">
        <div class="w-1/3">Full Name</div>
        <div class="w-2/3 text-gray-400">{{ user()?.name }}</div>
    </div>
    <hr class="text-gray-700" />

    <div class="flex py-6">
        <div class="w-1/3">Email</div>
        <div class="w-2/3 text-gray-400">{{ user()?.email }}</div>
    </div>
    <hr class="text-gray-700" />

    <div class="flex py-6">
        <div class="w-1/3">Bio</div>
        <div class="w-2/3 text-gray-400">{{ user()?.bio }}</div>
    </div>
</div>

@if(showDeleteModal()){
<div class="absolute top-32 w-1/2 h-fit bg-gray-800 rounded-lg border border-gray-700">
    <div>
        <div class="border-b border-b-gray-700 flex items-center justify-between px-6 py-4">
            <h5 class="text-xl">Delete Post</h5>
            <button type="button" class="cursor-pointer" (click)="closeModal()">
                <fa-icon [icon]="faXmark"></fa-icon>
            </button>
        </div>
        <div class="modal-body px-6 py-6">
            <p>Are you sure you want to delete this user?</p>
        </div>
        <div class="border-t border-t-gray-700 px-6 py-2 flex gap-2 justify-end">
            <app-button variant="primary" (click)="deleteUser(user()?.id)">Sure</app-button>
            <app-button variant="secondary" (click)="closeModal()">Cancel</app-button>
        </div>
    </div>
</div>
}
