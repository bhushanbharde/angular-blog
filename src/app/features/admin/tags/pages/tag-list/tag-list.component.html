<table class="border">
    <thead class="border">
        <th>Name</th>
        <th>Username</th>
        <th>Email</th>
    </thead>
    <tbody>

        @for(tag of tags(); track tag){
            <tr class="border">
                <td class="py-2 px-4">{{tag?.name}}</td>
                <td class="py-2 px-4">{{tag?.username}}</td>
                <td class="py-2 px-4">{{tag?.email}}</td>
            </tr>
        }
    </tbody>
</table>
