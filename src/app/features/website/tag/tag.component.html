<div class="px-24 h-screen">
  <div
    class="flex flex-wrap items-center whitespace-nowrap1 gap-3 overflow-x-scroll1 text-sm"
  >
    @for (tag of tags(); track tag.id) {
      <div
        routerLink="/tag/{{tag?.shortname}}"
        (click)="getTagBySlug(tag?.shortname)"
        [ngClass]="activeTag() === tag?.shortname ? 'bg-blue-600 ' : 'bg-gray-800'"
        class="inline-block px-4 py-2  rounded-lg hover:bg-gray-700 transition duration-300 hover:cursor-pointer"
      >
        {{ tag.name }}
      </div>
    }
  </div>

  <div class="mt-10 text-center">
    <h1 class="text-4xl font-bold">
      {{ tags()?.name }}
    </h1>
    <div class="w-fit mx-auto text-sm flex items-center">
      <span>Topic</span>
      <fa-icon [icon]="faCircle" class="text-[4px] mx-2"></fa-icon>
      <span>45k followers</span>
      <fa-icon [icon]="faCircle" class="text-[4px] mx-2"></fa-icon>
      <span>{{ posts()?.length }} stories</span>
      <app-button variant="outline" class="ml-6">Follow</app-button>
    </div>
  </div>

  <hr class="border border-gray-800 my-10">

  @if(posts()?.length){
    <h1 class="text-xl mb-6">Recommended stories</h1>
  }
  @else {
    <h1 class="text-xl font-light">No stories available</h1>
  }
  <div class=" grid grid-cols-3 gap-10">
    @for (post of posts(); track $index) {
      <app-article-card [article]="post" [user]="post?.user"></app-article-card>
    }
  </div>
</div>
