<div class="p-6 rounded-xl border border-gray-700 bg-gray-800/50 mb-6">
    <div class="flex items-center text-sm my-3">
        <img class="rounded-full w-8 mr-2 " src="{{ post?.user?.avatar }}" alt="">
        <a routerLink="/users/{{ post?.user?.id }}">{{ post?.user?.name }}</a>
        <fa-icon class="mx-2 text-gray-400 text-[4px]" [icon]="faCircle"></fa-icon>
        <span class="text-gray-400">{{ post?.created_at | date:'MMM dd, yyyy' }}</span>
    </div>

    <a routerLink="/post/{{ post?.id }}" class="flex ">
        <div class="w-9/12 pr-12">
            <h2 class="text-2xl my-2 font-bold">{{ post?.title }}</h2>
            <p class="line-clamp-3 text-sm text-gray-400 leading-6">
                {{ post?.content | stripTags }}
            </p>
        </div>

        <img class="w-3/12 h-40 rounded-lg object-cover" src="{{ post?.cover_image }}" alt="">
    </a>

    <div class="flex text-gray-400 text-sm gap-6 mt-4">
        <div>
            <fa-icon [icon]="faHeart"></fa-icon>
            {{ post?.likes_count }}
        </div>
        <div>
            <fa-icon [icon]="faComment"></fa-icon>
            {{ post?.comments_count }}
        </div>
        <div>
            <fa-icon [icon]="faRetweet"></fa-icon>
            12
        </div>
    </div>
</div>
